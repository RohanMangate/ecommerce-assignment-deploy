name: Build and Push Docker Images

on:
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: rohanm95

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/user-service
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/ecommerce-user-service:latest

      - name: Build and push Product Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/product-service
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/ecommerce-product-service:latest

      - name: Build and push Cart Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/cart-service
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/ecommerce-cart-service:latest

      - name: Build and push Order Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/order-service
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/ecommerce-order-service:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/ecommerce-frontend:latest
